name: Build & Test API
description: >-
  Shared .NET setup, NuGet caching, and restore for the StarterApp API.
  Optionally builds and tests (CI). Deploy workflows skip build/test and publish separately.

inputs:
  dotnet-version:
    description: .NET SDK version to install.
    required: false
    default: '10.0.x'
  run-build-test:
    description: When 'true', build and test the solution (CI). Deploy workflows set 'false'.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore
      shell: bash

    - name: Build
      if: inputs.run-build-test == 'true'
      run: dotnet build -c Release --no-restore
      shell: bash

    - name: Test
      if: inputs.run-build-test == 'true'
      run: dotnet test --no-build -c Release
      shell: bash
