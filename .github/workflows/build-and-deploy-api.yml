# Build and Deploy API — StarterApp.API → Azure App Service
#
# Auth model: OIDC (no long-lived secrets). Configure a federated credential on
# your Azure AD app registration with subject:
#   repo:<owner>/<repo>:ref:refs/heads/main
#
# Required secrets (Settings → Secrets and variables → Actions → Secrets):
#   AZURE_CLIENT_ID          - App registration / managed identity client ID
#   AZURE_TENANT_ID          - Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID    - Azure subscription ID
#   POSTGRES_ADMIN_PASSWORD  - PostgreSQL admin password (used only during Bicep infra deploy)
#
# Required vars (Settings → Secrets and variables → Actions → Variables):
#   AZURE_RESOURCE_GROUP     - Resource group name (e.g. starterapp-rg-dev)
#   AZURE_WEBAPP_NAME        - App Service web app name (e.g. starterapp-api-dev)

name: Build and Deploy API

on:
  # push:
  #   branches:
  #     - main
  #     - master
  #   paths:
  #     - 'StarterApp.API/**'
  workflow_dispatch:

permissions:
  id-token: write  # required for OIDC token request
  contents: read

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish
        run: dotnet publish StarterApp.API -c Release -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: starterapp-api-b${{ github.run_number }}
          path: publish
          retention-days: 30

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: starterapp-api-b${{ github.run_number }}
          path: publish

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Optional infrastructure step: provisions/updates all Azure resources via Bicep.
      # Runs on manual dispatch so you can apply infra changes on demand without a full
      # code push. Incremental mode means existing resources are updated, not recreated.
      - name: Deploy Bicep infrastructure
        if: github.event_name == 'workflow_dispatch'
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          az deployment group create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --template-file CI/Azure/main.bicep \
            --parameters @CI/Azure/parameters/main.parameters.dev.json \
            --parameters postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD" \
            --mode Incremental

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: publish
