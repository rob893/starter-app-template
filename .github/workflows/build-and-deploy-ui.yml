# Build and Deploy UI — starter-app-ui → GitHub Pages
#
# Prerequisites:
#   1. Enable GitHub Pages: Settings → Pages → Source → GitHub Actions
#   2. If deploying to a project site (not a user/org site), set the Vite base path
#      in starter-app-ui/vite.config.ts:
#        base: '/<repo-name>/'        (e.g. '/starter-app-template/')
#      For a custom domain or user/org site (username.github.io), use:
#        base: '/'
#      The UI already uses HashRouter, so client-side routing works on Pages.
#
# Required vars (Settings → Secrets and variables → Actions → Variables):
#   VITE_API_BASE_URL  - Base URL of the deployed API
#                        e.g. https://starterapp-api-dev.azurewebsites.net

name: Build and Deploy UI

on:
  # push:
  #   branches:
  #     - main
  #     - master
  #   paths:
  #     - 'starter-app-ui/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false  # let an in-progress deploy finish before starting another

jobs:
  build:
    name: Build UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter-app-ui

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: starter-app-ui/package-lock.json

      - name: Install packages
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      # Path is relative to workspace root; working-directory default does not apply to `uses` steps
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: starter-app-ui/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
