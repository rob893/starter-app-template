name: CI

on:
  # NOTE: PR/push triggers are intentionally commented out so this *template* repo's own CI stays idle.
  # When you use the template, uncomment them (see README -> "Using this template").
  workflow_dispatch:
  # pull_request:
  # push:
  #   branches-ignore:
  #     - main
  #     - master

jobs:
  api:
    name: Build & Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build & test API
        uses: ./.github/actions/build-test-api

  ui:
    name: Build & Test UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build & test UI
        uses: ./.github/actions/build-test-ui
